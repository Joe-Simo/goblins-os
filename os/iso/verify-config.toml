systemctl enable goblins-hwgate-session-orchestrator-starter.service || true
ln -sfn ../goblins-hwgate-session-orchestrator-starter.service \
  /etc/systemd/system/graphical.target.wants/goblins-hwgate-session-orchestrator-starter.service

cat > /etc/systemd/user/gnome-session@goblins-os.target.d/99-goblins-hwgate-session-orchestrator.conf <<'EOF'
[Unit]
Wants=goblins-hwgate-session-orchestrator.service
EOF

if test -x /etc/goblins-os/hardware-gate/goblins-hwgate-firstboot-diagnostics \
  && test -x /etc/goblins-os/hardware-gate/goblins-hwgate-session-orchestrator \
  && test -x /etc/goblins-os/hardware-gate/goblins-hwgate-start-session-orchestrator; then
  printf '%s\n' "GOBLINS_HWGATE_ETC_HELPERS_INSTALLED" | tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true
else
  printf '%s\n' "GOBLINS_HWGATE_ETC_HELPERS_MISSING" | tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true
fi

printf '%s\n' "GOBLINS_VERIFY_INSTALL_DONE" | tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true
%end
"""

[customizations.installer.modules]
disable = ["org.fedoraproject.Anaconda.Modules.Users"]

[customizations.iso]
volume_id = "GOBLINS_OS"
application_id = "Goblins OS"
publisher = "Goblins OS"
