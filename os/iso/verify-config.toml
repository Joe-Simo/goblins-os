# Goblins OS — verification-only install ISO config (not release media).
#
# The normal os/iso/config.toml deliberately leaves disk selection interactive so
# release media never auto-wipes a person's disk. The display-backed hardware
# gate needs an unattended install onto its disposable scratch disk, and the ISO
# generated by bootc-image-builder points Anaconda at its embedded /osbuild.ks.
# This config is selected only by proof workflows via GOBLINS_OS_ISO_CONFIG.
#
# bootc-image-builder injects the image-deploying ostreecontainer line; do not
# set it here.

[customizations.installer.kickstart]
contents = """
text --non-interactive
lang en_US.UTF-8
keyboard us
timezone --utc Etc/UTC
network --bootproto=dhcp --device=link --activate --onboot=on

# Verification-only scratch disk automation. The qemu hardware gate attaches
# exactly one disposable virtio disk as vda; never use this config for release
# media or a human install path.
ignoredisk --only-use=vda
zerombr
clearpart --all --initlabel --disklabel=gpt --drives=vda
bootloader --location=mbr --boot-drive=vda
reqpart --add-boot
part / --fstype=xfs --label=root --grow --size=1024 --ondisk=vda

reboot --eject
%post
{
  echo "GOBLINS_HWGATE_POST_DIAG_BEGIN"
  echo "post_default_target=$(systemctl get-default 2>&1 || true)"
  for path in \
    /etc/systemd/system/default.target \
    /usr/lib/systemd/system/default.target \
    /etc/systemd/system/display-manager.service \
    /usr/lib/systemd/system/display-manager.service; do
    if [ -e "$path" ] || [ -L "$path" ]; then
      echo "$path -> $(readlink "$path" 2>&1 || true)"
    else
      echo "$path missing"
    fi
  done
  systemctl is-enabled gdm.service display-manager.service 2>&1 || true
  if [ -r /etc/gdm/custom.conf ]; then
    echo "gdm_custom_conf_begin"
    sed -n '1,80p' /etc/gdm/custom.conf
    echo "gdm_custom_conf_end"
  else
    echo "/etc/gdm/custom.conf missing"
  fi
  if [ -r /var/lib/AccountsService/users/goblin ]; then
    echo "accountsservice_goblin_begin"
    sed -n '1,80p' /var/lib/AccountsService/users/goblin
    echo "accountsservice_goblin_end"
  else
    echo "/var/lib/AccountsService/users/goblin missing"
  fi
  shadow_field="$(getent shadow goblin 2>/dev/null | cut -d: -f2 || true)"
  case "$shadow_field" in
    "") echo "goblin_shadow_state=empty" ;;
    '!'*) echo "goblin_shadow_state=locked" ;;
    '*') echo "goblin_shadow_state=invalid-star" ;;
    *) echo "goblin_shadow_state=hash-present" ;;
  esac
  echo "GOBLINS_HWGATE_POST_DIAG_DONE"
} 2>&1 | tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true

# Anaconda's verification-only text install writes an /etc default.target
# override to multi-user.target even though the bootc image default is
# graphical.target. The display-backed proof needs the installed deployment to
# exercise the real GNOME/GDM session, so restore the image contract here.
systemctl set-default graphical.target
readlink /etc/systemd/system/default.target | grep -Fq graphical.target
printf '%s\n' "GOBLINS_HWGATE_GRAPHICAL_TARGET_RESTORED" | tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true

install -d -m 0755 /etc/goblins-os/hardware-gate

cat > /etc/goblins-os/hardware-gate/goblins-hwgate-firstboot-diagnostics <<'EOF'
#!/usr/bin/env bash
set +e
exec > >(tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true) 2>&1
echo "GOBLINS_HWGATE_DIAG_BEGIN"
echo "kernel=$(uname -r 2>&1)"
echo "default_target=$(systemctl get-default 2>&1)"
for path in \
  /etc/systemd/system/default.target \
  /usr/lib/systemd/system/default.target \
  /etc/systemd/system/display-manager.service \
  /usr/lib/systemd/system/display-manager.service; do
  if [ -e "$path" ] || [ -L "$path" ]; then
    echo "$path -> $(readlink "$path" 2>&1 || true)"
  else
    echo "$path missing"
  fi
done
echo "enabled_units_begin"
systemctl is-enabled graphical.target multi-user.target gdm.service display-manager.service 2>&1 || true
echo "enabled_units_end"
echo "active_units_begin"
systemctl is-active graphical.target multi-user.target gdm.service display-manager.service 2>&1 || true
echo "active_units_end"
systemctl --no-pager --full status graphical.target display-manager.service gdm.service 2>&1 || true
if [ -r /etc/gdm/custom.conf ]; then
  echo "gdm_custom_conf_begin"
  sed -n '1,80p' /etc/gdm/custom.conf
  echo "gdm_custom_conf_end"
else
  echo "/etc/gdm/custom.conf missing"
fi
if [ -r /var/lib/AccountsService/users/goblin ]; then
  echo "accountsservice_goblin_begin"
  sed -n '1,80p' /var/lib/AccountsService/users/goblin
  echo "accountsservice_goblin_end"
else
  echo "/var/lib/AccountsService/users/goblin missing"
fi
shadow_field="$(getent shadow goblin 2>/dev/null | cut -d: -f2 || true)"
case "$shadow_field" in
  "") echo "goblin_shadow_state=empty" ;;
  '!'*) echo "goblin_shadow_state=locked" ;;
  '*') echo "goblin_shadow_state=invalid-star" ;;
  *) echo "goblin_shadow_state=hash-present" ;;
esac
journalctl -b --no-pager \
  -u display-manager.service \
  -u gdm.service \
  -u systemd-logind.service \
  -u systemd-user-sessions.service \
  -n 200 2>&1 || true
echo "GOBLINS_HWGATE_DIAG_DONE"
EOF
chmod 0755 /etc/goblins-os/hardware-gate/goblins-hwgate-firstboot-diagnostics

cat > /etc/systemd/system/goblins-hwgate-firstboot-diagnostics.service <<'EOF'
[Unit]
Description=Goblins OS hardware-gate first-boot diagnostics
After=multi-user.target graphical.target display-manager.service gdm.service

[Service]
Type=oneshot
ExecStart=/etc/goblins-os/hardware-gate/goblins-hwgate-firstboot-diagnostics

[Install]
WantedBy=multi-user.target graphical.target
EOF
systemctl enable goblins-hwgate-firstboot-diagnostics.service || true
install -d /etc/systemd/system/multi-user.target.wants /etc/systemd/system/graphical.target.wants
ln -sfn ../goblins-hwgate-firstboot-diagnostics.service \
  /etc/systemd/system/multi-user.target.wants/goblins-hwgate-firstboot-diagnostics.service
ln -sfn ../goblins-hwgate-firstboot-diagnostics.service \
  /etc/systemd/system/graphical.target.wants/goblins-hwgate-firstboot-diagnostics.service

cat > /etc/goblins-os/hardware-gate/goblins-hwgate-session-orchestrator <<'EOF'
#!/usr/bin/env bash
set -euo pipefail
exec >>/tmp/goblins-hwgate-session-orchestrator.log 2>&1

serial() {
  echo "$*"
  printf '%s\n' "$*" | tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true
}

serial "GOBLINS_HWGATE_SESSION_ORCHESTRATOR_STARTED"

HOST_READY_URL="${GOBLINS_HWGATE_HOST_URL:-http://10.0.2.2:8099}"

download_with_wait() {
  local path="$1"
  local output="$2"
  local attempts="$3"
  local i
  for i in $(seq 1 "$attempts"); do
    if curl -fsS --max-time 2 -o "$output" "$HOST_READY_URL/$path"; then
      chmod 0700 "$output"
      return 0
    fi
    sleep 1
  done
  echo "failed to download $path from $HOST_READY_URL after ${attempts}s"
  return 1
}

for _ in $(seq 1 300); do
  [ -f /run/goblins-hwgate-firstboot-unlocked ] && break
  sleep 1
done
if [ ! -f /run/goblins-hwgate-firstboot-unlocked ]; then
  serial "GOBLINS_HWGATE_ROOT_FIRSTBOOT_HELPER_MISSING"
  exit 1
fi
serial "GOBLINS_HWGATE_ROOT_FIRSTBOOT_HELPER_READY"

# drive-capture.py publishes orchestrator.sh only after it has recorded the
# post-unlock HTTP log offset, so screenshot/proof signals cannot race ahead of
# the host tailer.
download_with_wait orchestrator.sh /tmp/gos-orchestrator 600
serial "GOBLINS_HWGATE_ORCHESTRATOR_DOWNLOADED"
GOBLINS_HWGATE_HOST_URL="$HOST_READY_URL" bash /tmp/gos-orchestrator
EOF
chmod 0755 /etc/goblins-os/hardware-gate/goblins-hwgate-session-orchestrator

install -d /etc/xdg/autostart
cat > /etc/xdg/autostart/goblins-hwgate-session-orchestrator.desktop <<'EOF'
[Desktop Entry]
Type=Application
Name=Goblins OS hardware-gate session orchestrator
NoDisplay=true
OnlyShowIn=GNOME;
X-GNOME-Autostart-enabled=true
Exec=/etc/goblins-os/hardware-gate/goblins-hwgate-session-orchestrator
EOF

install -d /etc/systemd/user/gnome-session@goblins-os.target.d
cat > /etc/systemd/user/goblins-hwgate-session-orchestrator.service <<'EOF'
[Unit]
Description=Goblins OS hardware-gate session orchestrator
After=gnome-session-initialized.target org.gnome.Shell@user.service org.goblins.OS.Shell.service org.goblins.OS.SessionBridge.service
Wants=org.goblins.OS.Shell.service org.goblins.OS.SessionBridge.service

[Service]
Type=oneshot
Environment=GOBLINS_HWGATE_HOST_URL=http://10.0.2.2:8099
Environment=XDG_SESSION_TYPE=wayland
Environment=WAYLAND_DISPLAY=wayland-0
Environment=DISPLAY=:0
Environment=XDG_CURRENT_DESKTOP=GNOME
Environment=XDG_SESSION_DESKTOP=goblins-os
Environment=DESKTOP_SESSION=goblins-os
ExecStart=/etc/goblins-os/hardware-gate/goblins-hwgate-session-orchestrator

[Install]
WantedBy=default.target
EOF
systemctl --global enable goblins-hwgate-session-orchestrator.service || true

cat > /etc/goblins-os/hardware-gate/goblins-hwgate-start-session-orchestrator <<'EOF'
#!/usr/bin/env bash
set -euo pipefail

serial() {
  echo "$*"
  printf '%s\n' "$*" | tee /dev/ttyS0 /dev/ttyAMA0 >/dev/null 2>/dev/null || true
}

uid="$(id -u goblin)"
runtime_dir="/run/user/${uid}"
bus="${runtime_dir}/bus"
HOST_READY_URL="${GOBLINS_HWGATE_HOST_URL:-http://10.0.2.2:8099}"

for _ in $(seq 1 240); do
  if [ -S "$bus" ]; then
    serial "GOBLINS_HWGATE_SESSION_BUS_READY"
    break
  fi
  sleep 1
done

if [ ! -S "$bus" ]; then
  serial "GOBLINS_HWGATE_SESSION_BUS_MISSING"
  exit 1
fi

download_with_wait() {
  local path="$1"
  local output="$2"
  local attempts="$3"
  local i
  for i in $(seq 1 "$attempts"); do
    if curl -fsS --max-time 2 -o "$output" "$HOST_READY_URL/$path"; then
      chmod 0700 "$output"
      return 0
    fi
    sleep 1
  done
  serial "GOBLINS_HWGATE_ROOT_HELPER_DOWNLOAD_FAILED path=$path"
  return 1
}

# Only this root system service receives the release-proof socket capability.
# The desktop user service waits for the root-owned marker and never receives a
# core URL, Unix group, or generic request relay.
install -d -m 0700 -o root -g root /run/goblins-hwgate-root
download_with_wait firstboot-unlock.sh /run/goblins-hwgate-root/firstboot 240
serial "GOBLINS_HWGATE_FIRSTBOOT_HELPER_DOWNLOADED"
download_with_wait core-proof-operation.sh /run/goblins-hwgate-root/core-proof-operation 240
install -m 0755 -o root -g root /run/goblins-hwgate-root/core-proof-operation \
  /etc/goblins-os/hardware-gate/goblins-hwgate-core-proof-operation
serial "GOBLINS_HWGATE_CORE_PROOF_HELPER_INSTALLED"
GOBLINS_HWGATE_HOST_URL="$HOST_READY_URL" bash /run/goblins-hwgate-root/firstboot
install -m 0644 -o root -g root /dev/null /run/goblins-hwgate-firstboot-unlocked
serial "GOBLINS_HWGATE_FIRSTBOOT_HELPER_RAN"

env_common=(
  "XDG_RUNTIME_DIR=${runtime_dir}"
  "DBUS_SESSION_BUS_ADDRESS=unix:path=${bus}"
  "GOBLINS_HWGATE_HOST_URL=http://10.0.2.2:8099"
  "XDG_SESSION_TYPE=wayland"
  "WAYLAND_DISPLAY=wayland-0"
  "DISPLAY=:0"
  "XDG_CURRENT_DESKTOP=GNOME"
  "XDG_SESSION_DESKTOP=goblins-os"
  "DESKTOP_SESSION=goblins-os"
)

runuser -u goblin -- env "${env_common[@]}" \
  dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_SESSION_TYPE XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP DESKTOP_SESSION DBUS_SESSION_BUS_ADDRESS || true
runuser -u goblin -- env "${env_common[@]}" \
  systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_SESSION_TYPE XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP DESKTOP_SESSION DBUS_SESSION_BUS_ADDRESS || true

if runuser -u goblin -- env "${env_common[@]}" \
  systemctl --user start --no-block goblins-hwgate-session-orchestrator.service; then
  serial "GOBLINS_HWGATE_SESSION_ORCHESTRATOR_START_REQUESTED"
else
  serial "GOBLINS_HWGATE_SESSION_ORCHESTRATOR_SYSTEMD_START_FAILED"
  runuser -u goblin -- env "${env_common[@]}" WAYLAND_DISPLAY=wayland-0 DISPLAY=:0 \
    /etc/goblins-os/hardware-gate/goblins-hwgate-session-orchestrator &
  serial "GOBLINS_HWGATE_SESSION_ORCHESTRATOR_DIRECT_FALLBACK_STARTED"
fi
EOF
chmod 0755 /etc/goblins-os/hardware-gate/goblins-hwgate-start-session-orchestrator

cat > /etc/systemd/system/goblins-hwgate-core-proof@.service <<'EOF'
[Unit]
Description=Goblins OS verification-only core proof operation %i
After=goblins-os-core.service

[Service]
Type=oneshot
ExecStart=/etc/goblins-os/hardware-gate/goblins-hwgate-core-proof-operation %i
ExecStopPost=-/etc/goblins-os/hardware-gate/goblins-hwgate-core-proof-operation %i-finished ${SERVICE_RESULT}
TimeoutStartSec=3900
NoNewPrivileges=yes
PrivateTmp=no
ProtectSystem=strict
ProtectHome=yes
LockPersonality=yes
MemoryDenyWriteExecute=yes
SystemCallArchitectures=native
EOF

cat > /etc/systemd/system/goblins-hwgate-fixture-core.service <<'EOF'
[Unit]
Description=Goblins OS verification-only fixture core on production capability sockets
