# Hardware-gate display-backed-VM capture for the x86_64 CI route.
# Manual-dispatch only (never auto-runs) — it consumes a caller-selected,
# digest-pinned candidate image, boots the verification ISO in a KVM-accelerated
# qemu VM, drives the install + the in-session capture harness, writes the
# 32-shot screenshot run + proof-manifest, and runs close-signoff.
# This is the only route to the x86_64 hardware-gate track (x86_64 cannot be
# produced on an Apple-Silicon dev host). Honest: real captures of the real OS;
# gaming via the image's own lavapipe/gamescope/pipewire stack.
name: hardware-gate-capture
on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Screenshot run date (YYYY-MM-DD)"
        required: true
        type: string
      candidate_commit:
        description: "Exact lowercase 40-hex source commit represented by the candidate image"
        required: true
        type: string
      candidate_image_ref:
        description: "Digest-pinned x86_64 candidate image (ghcr.io/...@sha256:<64 lowercase hex>)"
        required: true
        type: string

concurrency:
  group: hardware-gate-${{ inputs.candidate_commit }}-${{ inputs.run_date }}
  cancel-in-progress: true

env:
  GOBLINS_OS_INSTALLER_BRANDING_IMAGE: ghcr.io/joe-simo/goblins-os-installer-branding-tool@sha256:a5b2be1ce90514f1e4d1447bcd6eb6af51ea98644bc310c58ce649a7550e39c0
  GOBLINS_OS_CANDIDATE_COMMIT: ${{ inputs.candidate_commit }}
  GOBLINS_OS_CANDIDATE_IMAGE_REF: ${{ inputs.candidate_image_ref }}
  GOBLINS_OS_PROOF_OLLAMA_IMAGE: docker.io/ollama/ollama@sha256:1d9f0b83b852efef42435e65fd53d0dc4f462a60dabf5c719058c99d47f32e36
  GOBLINS_OS_PROOF_OLLAMA_MODEL: llama3.2:1b
  GOBLINS_OS_PROOF_OLLAMA_MODEL_MANIFEST_SHA256: baf6a787fdffd633537aa2eb51cfd54cb93ff08e28040095462bb63daf552878

permissions:
  contents: read
  packages: read

jobs:
  capture:
    # x86_64 only: GitHub's ubuntu-24.04-arm runners have no /dev/kvm (no nested
    # virt), so the aarch64 display-backed-VM run uses the local native
    # aarch64/HVF capture harness documented in os/hardware-gate/runbook.md.
    # This job covers the x86_64 track, which has no local route on an
    # Apple-Silicon dev host.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, runner: ubuntu-24.04, uname: x86_64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.candidate_commit }}
          fetch-depth: 1
          persist-credentials: false
      - name: Validate exact candidate inputs and checkout
        env:
          RUN_DATE: ${{ inputs.run_date }}
        run: |
          set -euo pipefail
          [[ "$GOBLINS_OS_CANDIDATE_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "candidate_commit must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          }
          [[ "$GOBLINS_OS_CANDIDATE_IMAGE_REF" =~ ^ghcr\.io/[a-z0-9][a-z0-9._/-]*[a-z0-9]@sha256:[0-9a-f]{64}$ ]] || {
            echo "candidate_image_ref must be a lowercase digest-pinned ghcr.io reference" >&2
            exit 1
          }
          [[ "$GOBLINS_OS_CANDIDATE_IMAGE_REF" != *".."* && "$GOBLINS_OS_CANDIDATE_IMAGE_REF" != *"//"* ]] || {
            echo "candidate_image_ref contains an invalid repository path" >&2
            exit 1
          }
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          expected_prefix="ghcr.io/$owner/goblins-os@sha256:"
          [[ "$GOBLINS_OS_CANDIDATE_IMAGE_REF" == "$expected_prefix"* ]] || {
            echo "candidate_image_ref must identify this repository's Goblins OS package: $expected_prefix<digest>" >&2
            exit 1
          }
          [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || {
            echo "run_date must use YYYY-MM-DD" >&2
            exit 1
          }
          test "$(date -u -d "$RUN_DATE" +%F 2>/dev/null)" = "$RUN_DATE" || {
            echo "run_date must be a real calendar date" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "$GOBLINS_OS_CANDIDATE_COMMIT"
          test -z "$(git status --porcelain --untracked-files=normal)"
      - name: Assert native arch + KVM
        run: |
          test "$(uname -m)" = "${{ matrix.uname }}"
          test -e /dev/kvm || { echo "no /dev/kvm on this runner"; exit 1; }
          sudo chmod a+rw /dev/kvm
          test -r /dev/kvm && test -w /dev/kvm || { ls -l /dev/kvm; echo "/dev/kvm is not readable/writable by the runner"; exit 1; }
      - name: Free disk and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache /usr/share/swift /usr/local/lib/node_modules \
            /usr/share/miniconda /usr/lib/jvm /usr/local/share/powershell \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo apt-get clean || true
          sudo docker image prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile || true
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile
          df -h /
      - name: Install qemu/KVM + capture deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-system-arm qemu-utils ovmf \
            mtools dosfstools imagemagick curl jq python3 socat ripgrep
          if [ "${{ matrix.arch }}" = aarch64 ]; then sudo apt-get install -y qemu-efi-aarch64; fi
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Pull and verify the digest-pinned candidate image
        run: |
          set -euo pipefail
          docker pull "$GOBLINS_OS_CANDIDATE_IMAGE_REF"
          test "$(docker image inspect --format '{{.Os}}' "$GOBLINS_OS_CANDIDATE_IMAGE_REF")" = "linux"
          test "$(docker image inspect --format '{{.Architecture}}' "$GOBLINS_OS_CANDIDATE_IMAGE_REF")" = "amd64"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$GOBLINS_OS_CANDIDATE_IMAGE_REF")" = "$GOBLINS_OS_CANDIDATE_COMMIT"
      - name: Verify the exact candidate source contract
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -w /workspace \
            "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            /usr/libexec/goblins-os/goblins-os-verify --source-root /workspace \
            | tee /tmp/goblins-os-x86_64-source-verify.log
          grep -Eq '^goblins_os_verify_result total=[0-9]+ blocked=0$' \
            /tmp/goblins-os-x86_64-source-verify.log
      - name: Build the verification installer ISO from the candidate digest
        run: |
          GOBLINS_OS_CONTAINER_RUNTIME=docker \
          GOBLINS_OS_ARCH=${{ matrix.arch }} \
          GOBLINS_OS_ISO_CONFIG=os/iso/verify-config.toml \
          GOBLINS_OS_IMAGE="$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
          GOBLINS_OS_SKIP_LOCAL_IMAGE_BUILD=1 \
          GOBLINS_OS_SHIPPABLE_RELEASE=1 \
          GOBLINS_OS_BIB_SOURCE_IMAGE="$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
          os/iso/build-iso.sh
      - name: Generate release evidence for the captured image
        run: |
          mkdir -p os/signoff-proofs/sbom/${{ matrix.arch }}
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -v "$PWD/os/signoff-proofs/sbom/${{ matrix.arch }}:/out" \
            -w /workspace \
            "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            /usr/libexec/goblins-os/goblins-os-verify \
            --source-root /workspace \
            --release-evidence /out \
            --arch ${{ matrix.arch }} \
            --candidate-commit "$GOBLINS_OS_CANDIDATE_COMMIT" \
            --image-ref "$GOBLINS_OS_CANDIDATE_IMAGE_REF"
          . ./os/hardware-gate/rpm-sbom-arch.sh
          rpm_sbom_arch_matches os/signoff-proofs/sbom/${{ matrix.arch }}/rpm-packages.tsv ${{ matrix.arch }}
          . ./os/hardware-gate/release-evidence.sh
          goblins_os_release_evidence_hashes_match os/signoff-proofs/sbom/${{ matrix.arch }}
      - name: Scan generated release evidence for secrets
        run: |
          . ./os/hardware-gate/secret-scan.sh
          goblins_os_artifact_secret_scan "$PWD"
      - name: Reclaim disk and serve the pinned local model for studio-live
        run: |
          set -euo pipefail
          docker create --name goblins-candidate-proof-keeper \
            "$GOBLINS_OS_CANDIDATE_IMAGE_REF" /usr/bin/true >/dev/null
          docker image prune -af || true
          sudo apt-get clean || true
          df -h /
          docker pull "$GOBLINS_OS_PROOF_OLLAMA_IMAGE"
          test "$(docker image inspect --format '{{.Os}}' "$GOBLINS_OS_PROOF_OLLAMA_IMAGE")" = linux
          test "$(docker image inspect --format '{{.Architecture}}' "$GOBLINS_OS_PROOF_OLLAMA_IMAGE")" = amd64
          model_dir="$RUNNER_TEMP/goblins-os-proof-ollama"
          mkdir -p "$model_dir"
          docker run -d --name goblins-proof-ollama \
            -p 127.0.0.1:11434:11434 \
            -v "$model_dir:/root/.ollama" \
            "$GOBLINS_OS_PROOF_OLLAMA_IMAGE" >/dev/null
          for i in $(seq 1 60); do
            curl -sf localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
          curl -fsS localhost:11434/api/tags >/dev/null
          docker exec goblins-proof-ollama ollama pull "$GOBLINS_OS_PROOF_OLLAMA_MODEL"
          actual_model_manifest_sha="$(
            docker exec goblins-proof-ollama sha256sum \
              /root/.ollama/models/manifests/registry.ollama.ai/library/llama3.2/1b \
              | awk '{print $1}'
          )"
          test "$actual_model_manifest_sha" = "$GOBLINS_OS_PROOF_OLLAMA_MODEL_MANIFEST_SHA256"
      - name: Run the display-backed-VM capture + close-signoff
        run: |
          REPO_ROOT="$PWD" \
          GOBLINS_OS_ARCH=${{ matrix.arch }} \
          GOBLINS_OS_IMAGE="$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
          GOBLINS_OS_CAPTURE_WORKFLOW_RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
          GOBLINS_OS_CAPTURE_WORKFLOW_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
          GOBLINS_OS_CAPTURE_REQUIRE_COMPLETE=1 \
          RUN_DATE="${{ inputs.run_date }}" \
            bash os/hardware-gate/capture-harness/run-capture.sh
      - name: Verify shipping status (informational)
        run: ./os/hardware-gate/verify-shipping-status.sh || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: hardware-gate-run-${{ matrix.arch }}
          path: |
            os/iso/output/${{ matrix.arch }}/bootiso/goblins-os-${{ matrix.arch }}.iso
            os/iso/output/${{ matrix.arch }}/bootiso/goblins-os-${{ matrix.arch }}.iso.sha256
            os/iso/output/${{ matrix.arch }}/manifest-goblins-os-${{ matrix.arch }}.json
            os/iso/output/${{ matrix.arch }}/manifest-anaconda-iso.json
            os/screenshots/hardware-gate/${{ matrix.arch }}/${{ inputs.run_date }}/
            os/signoff-proofs/sbom/${{ matrix.arch }}/
            os/signoff-notes.md
