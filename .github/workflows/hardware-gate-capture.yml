# Hardware-gate display-backed-VM capture, on NATIVE dual-arch runners.
# Manual-dispatch only (never auto-runs) — it boots the shippable ISO in a
# KVM-accelerated qemu VM, drives the install + the in-session capture harness,
# writes the 27-shot screenshot run + proof-manifest, and runs close-signoff.
# This is the only route to the x86_64 hardware-gate track (x86_64 cannot be
# produced on an Apple-Silicon dev host). Honest: real captures of the real OS;
# gaming via the image's own lavapipe/gamescope/pipewire stack.
name: hardware-gate-capture
on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Screenshot run date (YYYY-MM-DD)"
        required: true

concurrency:
  group: hardware-gate-${{ github.ref }}-${{ inputs.run_date }}
  cancel-in-progress: true

jobs:
  capture:
    # x86_64 only: GitHub's ubuntu-24.04-arm runners have no /dev/kvm (no nested
    # virt), so the aarch64 display-backed-VM run is captured locally on an
    # Apple-Silicon/hvf host instead. This job covers the x86_64 track, which
    # has no local route on an Apple-Silicon dev host.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  runner: ubuntu-24.04,     uname: x86_64, platform: linux/amd64 }
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Assert native arch + KVM
        run: |
          test "$(uname -m)" = "${{ matrix.uname }}"
          test -e /dev/kvm || { echo "no /dev/kvm on this runner"; exit 1; }
          sudo chmod a+rw /dev/kvm
          test -r /dev/kvm && test -w /dev/kvm || { ls -l /dev/kvm; echo "/dev/kvm is not readable/writable by the runner"; exit 1; }
      - name: Free disk and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache /usr/share/swift /usr/local/lib/node_modules \
            /usr/share/miniconda /usr/lib/jvm /usr/local/share/powershell \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo apt-get clean || true
          sudo docker image prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile || true
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile
          df -h /
      - name: Install qemu/KVM + capture deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-system-arm qemu-utils ovmf \
            mtools dosfstools imagemagick curl jq python3 socat ripgrep
          if [ "${{ matrix.arch }}" = aarch64 ]; then sudo apt-get install -y qemu-efi-aarch64; fi
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Compute lowercase GHCR ref
        id: ref
        run: |
          owner='${{ github.repository_owner }}'; owner="${owner,,}"
          echo "ref=ghcr.io/${owner}/goblins-os:${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Build and publish the Goblins OS image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: os/bootc/Containerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.ref.outputs.ref }}
          cache-from: type=gha,scope=goblins-os-bootc-${{ matrix.arch }}
          cache-to: type=gha,scope=goblins-os-bootc-${{ matrix.arch }},mode=max,ignore-error=true
      - name: Build the verification installer ISO from the published ref
        run: |
          GOBLINS_OS_CONTAINER_RUNTIME=docker \
          GOBLINS_OS_ARCH=${{ matrix.arch }} \
          GOBLINS_OS_ISO_CONFIG=os/iso/verify-config.toml \
          GOBLINS_OS_IMAGE='${{ steps.ref.outputs.ref }}' \
          GOBLINS_OS_SKIP_LOCAL_IMAGE_BUILD=1 \
          GOBLINS_OS_SHIPPABLE_RELEASE=1 \
          GOBLINS_OS_BIB_SOURCE_IMAGE='${{ steps.ref.outputs.ref }}' \
          GOBLINS_OS_BIB_AUTH_FILE="$HOME/.docker/config.json" \
          os/iso/build-iso.sh
      - name: Reclaim image-build disk + serve a small model for studio-live
        run: |
          docker image prune -af || true
          sudo apt-get clean || true
          df -h /
          curl -fsSL https://ollama.com/install.sh | sh
          OLLAMA_HOST=0.0.0.0:11434 nohup ollama serve >/tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf localhost:11434/api/tags >/dev/null && break; sleep 1; done
          ollama pull llama3.2:1b
      - name: Run the display-backed-VM capture + close-signoff
        run: |
          chmod +x os/hardware-gate/capture-harness/*.sh os/hardware-gate/capture-harness/*.py
          REPO_ROOT="$PWD" \
          GOBLINS_OS_ARCH=${{ matrix.arch }} \
          GOBLINS_OS_IMAGE='${{ steps.ref.outputs.ref }}' \
          RUN_DATE="${{ inputs.run_date }}" \
            bash os/hardware-gate/capture-harness/run-capture.sh
      - name: Commit the screenshot run + signoff back to the repo
        run: |
          git config user.name "goblins-os-ci"
          git config user.email "ci@goblins.os"
          git add -f "os/screenshots/hardware-gate/${{ matrix.arch }}/" os/signoff-notes.md || true
          git pull --rebase origin main || true
          git commit -m "hardware-gate: ${{ matrix.arch }} display-backed-VM capture run ${{ inputs.run_date }}" || echo "nothing to commit"
          for i in 1 2 3 4 5; do git push origin main && break || { git pull --rebase origin main; sleep $((RANDOM % 5 + 2)); }; done
      - name: Verify shipping status (informational)
        run: ./os/hardware-gate/verify-shipping-status.sh || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hardware-gate-run-${{ matrix.arch }}
          path: |
            os/screenshots/hardware-gate/${{ matrix.arch }}/
            os/signoff-notes.md
