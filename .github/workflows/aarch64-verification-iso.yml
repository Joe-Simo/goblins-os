# Goblins OS — aarch64 verification-only ISO for local HVF capture.
#
# This workflow does not publish release media and does not satisfy hardware
# signoff by itself. It builds the noninteractive hardware-gate ISO on a native
# GitHub arm runner, uploads it as a short-lived artifact, and leaves the real
# display-backed capture to the Apple-Silicon/HVF route in the runbook.
name: aarch64-verification-iso

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Screenshot run date that will consume this ISO (YYYY-MM-DD)"
        required: true

concurrency:
  group: aarch64-verification-iso-${{ github.ref }}-${{ inputs.run_date }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-verification-iso:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Assert native aarch64 runner
        run: test "$(uname -m)" = "aarch64"
      - name: Free disk and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache /usr/share/swift /usr/local/lib/node_modules \
            /usr/share/miniconda /usr/lib/jvm /usr/local/share/powershell \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo apt-get clean || true
          sudo docker image prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile || true
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          df -h /
          free -h
      - name: Install signoff tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Compute lowercase GHCR ref
        id: ref
        run: |
          owner='${{ github.repository_owner }}'
          owner="${owner,,}"
          echo "ref=ghcr.io/${owner}/goblins-os:aarch64" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Build and publish the aarch64 bootc image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: os/bootc/Containerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ref.outputs.ref }}
          cache-from: type=gha,scope=goblins-os-bootc-aarch64
          cache-to: type=gha,scope=goblins-os-bootc-aarch64,mode=max,ignore-error=true
      - name: Build verification-only installer ISO from the published ref
        run: |
          GOBLINS_OS_CONTAINER_RUNTIME=docker \
          GOBLINS_OS_ARCH=aarch64 \
          GOBLINS_OS_ISO_CONFIG=os/iso/verify-config.toml \
          GOBLINS_OS_IMAGE='${{ steps.ref.outputs.ref }}' \
          GOBLINS_OS_SKIP_LOCAL_IMAGE_BUILD=1 \
          GOBLINS_OS_SHIPPABLE_RELEASE=1 \
          GOBLINS_OS_BIB_SOURCE_IMAGE='${{ steps.ref.outputs.ref }}' \
          GOBLINS_OS_BIB_AUTH_FILE="$HOME/.docker/config.json" \
          os/iso/build-iso.sh
      - name: Verify capture-only ISO markers
        run: |
          cd os/iso/output/aarch64/bootiso
          sha256sum -c goblins-os-aarch64.iso.sha256
          for needle in \
            "GOBLINS_VERIFY_INSTALL_DONE" \
            "ignoredisk --only-use=vda" \
            "goblins-hwgate-session-orchestrator"; do
            LC_ALL=C grep -aFq "$needle" goblins-os-aarch64.iso
          done
      - name: Generate release evidence for the captured image
        run: |
          mkdir -p os/signoff-proofs/sbom/aarch64
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -v "$PWD/os/signoff-proofs/sbom/aarch64:/out" \
            -w /workspace \
            '${{ steps.ref.outputs.ref }}' \
            /usr/libexec/goblins-os/goblins-os-verify \
            --source-root /workspace \
            --release-evidence /out \
            --arch aarch64
          docker run --rm \
            -v "$PWD/os/signoff-proofs/sbom/aarch64:/out" \
            -w /out \
            '${{ steps.ref.outputs.ref }}' \
            sh rpm-packages.command
          . ./os/hardware-gate/rpm-sbom-arch.sh
          rpm_sbom_arch_matches os/signoff-proofs/sbom/aarch64/rpm-packages.tsv aarch64
      - name: Scan generated release evidence for secrets
        run: |
          . ./os/hardware-gate/secret-scan.sh
          goblins_os_artifact_secret_scan "$PWD"
      - name: Run Linux close-signoff for committed HVF screenshot run
        run: |
          screenshot_dir="os/screenshots/hardware-gate/aarch64/${{ inputs.run_date }}"
          if [ ! -d "$screenshot_dir" ]; then
            echo "No committed local-HVF screenshot run at $screenshot_dir; skipping close-signoff."
            exit 0
          fi
          runtime_engine_source="$(jq -r '.engine_source // empty' "$screenshot_dir/runtime-build-proof.json")"
          GOBLINS_OS_ARCH=aarch64 \
          GOBLINS_OS_IMAGE='${{ steps.ref.outputs.ref }}' \
          SCREENSHOT_DIR="$screenshot_dir" \
          RUNTIME_ENGINE_MODE=local-model \
          RUNTIME_ENGINE_SOURCE="$runtime_engine_source" \
          RUNTIME_ENGINE_CONFIG="$screenshot_dir/runtime-build-proof.json" \
          BUILT_ARTIFACT_PATH_URL="$screenshot_dir/runtime-build-proof.json" \
          CI_RUST_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
          CI_IMAGE_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
          CI_INSTALLER_ISO_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            ./os/hardware-gate/close-signoff.sh
      - name: Commit Linux aarch64 signoff evidence
        run: |
          git config user.name "goblins-os-ci"
          git config user.email "ci@goblins.os"
          git add -f os/signoff-proofs/sbom/aarch64 os/signoff-notes.md || true
          if [ -d "os/screenshots/hardware-gate/aarch64/${{ inputs.run_date }}" ]; then
            git add -f "os/screenshots/hardware-gate/aarch64/${{ inputs.run_date }}"
          fi
          git pull --rebase origin main || true
          git commit -m "hardware-gate: aarch64 Linux signoff ${{ inputs.run_date }}" || echo "nothing to commit"
          for i in 1 2 3 4 5; do
            git push origin main && break || { git pull --rebase origin main; sleep $((RANDOM % 5 + 2)); }
          done
      - uses: actions/upload-artifact@v4
        with:
          name: goblins-os-aarch64-verification-iso-${{ inputs.run_date }}
          retention-days: 7
          path: |
            os/iso/output/aarch64/bootiso/goblins-os-aarch64.iso
            os/iso/output/aarch64/bootiso/goblins-os-aarch64.iso.sha256
            os/iso/output/aarch64/manifest-goblins-os-aarch64.json
            os/iso/output/aarch64/manifest-anaconda-iso.json
            os/signoff-proofs/sbom/aarch64/
            os/screenshots/hardware-gate/aarch64/${{ inputs.run_date }}/
            os/signoff-notes.md
