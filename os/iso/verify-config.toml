install -d -m 0755 /etc/polkit-1/rules.d
cat > /etc/polkit-1/rules.d/60-goblins-hwgate-core-proof.rules <<'EOF'
polkit.addRule(function(action, subject) {
    if (action.id !== "org.freedesktop.systemd1.manage-units" ||
        subject.user !== "goblin") {
        return polkit.Result.NOT_HANDLED;
    }

    var unit = action.lookup("unit");
    var verb = action.lookup("verb");
    if (verb === "start" && unit && unit.match(/^goblins-hwgate-core-proof@(health|audio-status|preview-status|firewall-status|firewall-disable|firewall-enable|text-shortcuts-status|keyboard-shortcut-set|keyboard-shortcut-reset|keyboard-modifier-set|keyboard-modifier-reset|input-sources-set|input-switch-next|displays-status|display-apply-verify|display-apply-temporary|display-apply-persistent-guard|display-apply-stale|app-privacy-revoke|focus-mode-seed|focus-status|focus-activate|focus-deactivate|preview-open-pdf|preview-open-image|preview-open-unsupported|policy-status|policy-grant-app-builder|app-build|fixture-start|fixture-restore)\\.service$/)) {
        return polkit.Result.YES;
    }

    return polkit.Result.NOT_HANDLED;
});
EOF
systemctl daemon-reload

cat > /etc/systemd/system/goblins-hwgate-session-orchestrator-starter.service <<'EOF'
