# Seed the default Codex config into the persistent CODEX_HOME on boot. `C` copies
# the read-only /usr default only if the target is absent, so a user's Codex
# sign-in (auth.json) and any config edits persist across image updates.
#
# CODEX_HOME is owner-only (0700 goblins-os): it holds the OpenAI account
# credential (auth.json), which only the service user may read — the desktop
# session is not in the goblins-os group and can never reach it. The Codex agent's
# scratch workspace lives OUTSIDE this directory (under apps/codex-work) so an
# agent step never operates adjacent to the token. The seeded config is 0600.
d /var/lib/goblins-os/codex 0700 goblins-os goblins-os -
d /var/lib/goblins-os/apps/codex-work 0700 goblins-os goblins-os -
C /var/lib/goblins-os/codex/config.toml 0600 goblins-os goblins-os - /usr/share/goblins-os/codex/config.toml
