<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Two slider tracks with offset knobs — the control-center mark, authored as a
       GNOME symbolic icon (#2e3436 placeholder) so the menu bar can recolor it per
       scheme: #f5f5f7 on the dark glass panel, #1a1a1f on the light frosted panel. -->
  <line x1="4" y1="8.5" x2="20" y2="8.5" stroke="#2e3436" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="4" y1="15.5" x2="20" y2="15.5" stroke="#2e3436" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="15" cy="8.5" r="2.9" fill="#2e3436"/>
  <circle cx="9" cy="15.5" r="2.9" fill="#2e3436"/>
</svg>
