# Goblins OS — aarch64 verification-only ISO for local HVF capture.
#
# This workflow does not publish release media and does not satisfy hardware
# signoff by itself. It consumes a caller-selected, digest-pinned candidate
# image, builds the noninteractive hardware-gate ISO on a native GitHub arm
# runner, uploads it as a short-lived artifact, and leaves the real
# display-backed capture to the Apple-Silicon/HVF route in the runbook.
name: aarch64-verification-iso

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Screenshot run date that will consume this ISO (YYYY-MM-DD)"
        required: true
        type: string
      candidate_commit:
        description: "Exact lowercase 40-hex source commit represented by the candidate image"
        required: true
        type: string
      candidate_image_ref:
        description: "Digest-pinned aarch64 candidate image (ghcr.io/...@sha256:<64 lowercase hex>)"
        required: true
        type: string

concurrency:
  group: aarch64-verification-iso-${{ inputs.candidate_commit }}-${{ inputs.run_date }}
  cancel-in-progress: true

env:
  GOBLINS_OS_INSTALLER_BRANDING_IMAGE: ghcr.io/joe-simo/goblins-os-installer-branding-tool@sha256:a5b2be1ce90514f1e4d1447bcd6eb6af51ea98644bc310c58ce649a7550e39c0
  GOBLINS_OS_CANDIDATE_COMMIT: ${{ inputs.candidate_commit }}
  GOBLINS_OS_CANDIDATE_IMAGE_REF: ${{ inputs.candidate_image_ref }}

permissions:
  contents: read
  packages: read

jobs:
  build-verification-iso:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.candidate_commit }}
          fetch-depth: 1
          persist-credentials: false
      - name: Validate exact candidate inputs and checkout
        env:
          RUN_DATE: ${{ inputs.run_date }}
        run: |
          set -euo pipefail
          [[ "$GOBLINS_OS_CANDIDATE_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "candidate_commit must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          }
          [[ "$GOBLINS_OS_CANDIDATE_IMAGE_REF" =~ ^ghcr\.io/[a-z0-9][a-z0-9._/-]*[a-z0-9]@sha256:[0-9a-f]{64}$ ]] || {
            echo "candidate_image_ref must be a lowercase digest-pinned ghcr.io reference" >&2
            exit 1
          }
          [[ "$GOBLINS_OS_CANDIDATE_IMAGE_REF" != *".."* && "$GOBLINS_OS_CANDIDATE_IMAGE_REF" != *"//"* ]] || {
            echo "candidate_image_ref contains an invalid repository path" >&2
            exit 1
          }
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          expected_prefix="ghcr.io/$owner/goblins-os@sha256:"
          [[ "$GOBLINS_OS_CANDIDATE_IMAGE_REF" == "$expected_prefix"* ]] || {
            echo "candidate_image_ref must identify this repository's Goblins OS package: $expected_prefix<digest>" >&2
            exit 1
          }
          [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || {
            echo "run_date must use YYYY-MM-DD" >&2
            exit 1
          }
          test "$(date -u -d "$RUN_DATE" +%F 2>/dev/null)" = "$RUN_DATE" || {
            echo "run_date must be a real calendar date" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "$GOBLINS_OS_CANDIDATE_COMMIT"
          test -z "$(git status --porcelain --untracked-files=normal)"
      - name: Assert native aarch64 runner
        run: test "$(uname -m)" = "aarch64"
      - name: Free disk and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache /usr/share/swift /usr/local/lib/node_modules \
            /usr/share/miniconda /usr/lib/jvm /usr/local/share/powershell \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo apt-get clean || true
          sudo docker image prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile || true
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          df -h /
          free -h
      - name: Install signoff tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Pull and verify the digest-pinned candidate image
        run: |
          set -euo pipefail
          docker pull "$GOBLINS_OS_CANDIDATE_IMAGE_REF"
          test "$(docker image inspect --format '{{.Os}}' "$GOBLINS_OS_CANDIDATE_IMAGE_REF")" = "linux"
          test "$(docker image inspect --format '{{.Architecture}}' "$GOBLINS_OS_CANDIDATE_IMAGE_REF")" = "arm64"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$GOBLINS_OS_CANDIDATE_IMAGE_REF")" = "$GOBLINS_OS_CANDIDATE_COMMIT"
      - name: Verify the exact candidate source contract
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -w /workspace \
            "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            /usr/libexec/goblins-os/goblins-os-verify --source-root /workspace \
            | tee /tmp/goblins-os-aarch64-source-verify.log
          grep -Eq '^goblins_os_verify_result total=[0-9]+ blocked=0$' \
            /tmp/goblins-os-aarch64-source-verify.log
      - name: Verify the exact candidate installed-root contract
        run: |
          set -euo pipefail
          docker run --rm "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            /usr/libexec/goblins-os/goblins-os-verify --installed-root / \
            | tee /tmp/goblins-os-aarch64-installed-verify.log
          grep -Eq '^goblins_os_verify_result total=[0-9]+ blocked=0$' \
            /tmp/goblins-os-aarch64-installed-verify.log
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Run the exact candidate install and services self-test
        run: |
          set -euo pipefail
          printf 'FROM %s AS goblins-os\n' "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            > /tmp/goblins-os-aarch64-candidate-selftest.Dockerfile
          cat os/bootc/selftest.suffix.Dockerfile \
            >> /tmp/goblins-os-aarch64-candidate-selftest.Dockerfile
          docker buildx build \
            --file /tmp/goblins-os-aarch64-candidate-selftest.Dockerfile \
            --target selftest \
            --output type=cacheonly \
            .
      - name: Build verification-only installer ISO from the candidate digest
        run: |
          GOBLINS_OS_CONTAINER_RUNTIME=docker \
          GOBLINS_OS_ARCH=aarch64 \
          GOBLINS_OS_ISO_CONFIG=os/iso/verify-config.toml \
          GOBLINS_OS_IMAGE="$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
          GOBLINS_OS_SKIP_LOCAL_IMAGE_BUILD=1 \
          GOBLINS_OS_SHIPPABLE_RELEASE=1 \
          GOBLINS_OS_BIB_SOURCE_IMAGE="$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
          os/iso/build-iso.sh
      - name: Verify capture-only ISO markers
        run: |
          cd os/iso/output/aarch64/bootiso
          sha256sum -c goblins-os-aarch64.iso.sha256
          for needle in \
            "GOBLINS_VERIFY_INSTALL_DONE" \
            "ignoredisk --only-use=vda" \
            "goblins-hwgate-session-orchestrator"; do
            LC_ALL=C grep -aFq "$needle" goblins-os-aarch64.iso
          done
      - name: Generate release evidence for the captured image
        run: |
          mkdir -p os/signoff-proofs/sbom/aarch64
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -v "$PWD/os/signoff-proofs/sbom/aarch64:/out" \
            -w /workspace \
            "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            /usr/libexec/goblins-os/goblins-os-verify \
            --source-root /workspace \
            --release-evidence /out \
            --arch aarch64 \
            --candidate-commit "$GOBLINS_OS_CANDIDATE_COMMIT" \
            --image-ref "$GOBLINS_OS_CANDIDATE_IMAGE_REF"
          . ./os/hardware-gate/rpm-sbom-arch.sh
          rpm_sbom_arch_matches os/signoff-proofs/sbom/aarch64/rpm-packages.tsv aarch64
          . ./os/hardware-gate/release-evidence.sh
          goblins_os_release_evidence_hashes_match os/signoff-proofs/sbom/aarch64
      - name: Record the native aarch64 packaging gate
        run: |
          set -euo pipefail
          proof_dir="/tmp/goblins-os-native-gate-aarch64"
          iso="os/iso/output/aarch64/bootiso/goblins-os-aarch64.iso"
          iso_manifest="os/iso/output/aarch64/manifest-goblins-os-aarch64.json"
          bib_manifest="os/iso/output/aarch64/manifest-anaconda-iso.json"
          evidence_manifest="os/signoff-proofs/sbom/aarch64/release-evidence-manifest.json"
          mkdir -p "$proof_dir"
          verification_iso_sha256="$(sha256sum "$iso" | awk '{print $1}')"
          iso_manifest_sha256="$(sha256sum "$iso_manifest" | awk '{print $1}')"
          bib_manifest_sha256="$(sha256sum "$bib_manifest" | awk '{print $1}')"
          release_evidence_manifest_sha256="$(sha256sum "$evidence_manifest" | awk '{print $1}')"
          jq -n \
            --arg commit "$GOBLINS_OS_CANDIDATE_COMMIT" \
            --arg image "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            --arg source_repository "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            --arg workflow_run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --argjson workflow_run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg verification_iso_sha256 "$verification_iso_sha256" \
            --arg iso_manifest_sha256 "$iso_manifest_sha256" \
            --arg bib_manifest_sha256 "$bib_manifest_sha256" \
            --arg release_evidence_manifest_sha256 "$release_evidence_manifest_sha256" \
            '{
              schema: "goblins-os-native-packaging-gate-v1",
              architecture: "aarch64",
              candidate_commit: $commit,
              image_ref: $image,
              image_digest_pinned: true,
              source_verifier: "pass",
              installed_root_verifier: "pass",
              services_selftest: "pass",
              verification_iso_sha256: $verification_iso_sha256,
              iso_manifest_sha256: $iso_manifest_sha256,
              bib_manifest_sha256: $bib_manifest_sha256,
              release_evidence_manifest_sha256: $release_evidence_manifest_sha256,
              runner_os: "Linux",
              runner_architecture: "aarch64",
              native_runner: true,
              source_repository: $source_repository,
              workflow_run: $workflow_run,
              workflow_run_attempt: $workflow_run_attempt
            }' > "$proof_dir/native-packaging-gate.json"
          jq -e \
            --arg commit "$GOBLINS_OS_CANDIDATE_COMMIT" \
            --arg image "$GOBLINS_OS_CANDIDATE_IMAGE_REF" \
            --arg iso_sha "$verification_iso_sha256" \
            --arg iso_manifest_sha "$iso_manifest_sha256" \
            --arg bib_manifest_sha "$bib_manifest_sha256" \
            --arg evidence_manifest_sha "$release_evidence_manifest_sha256" \
            --argjson attempt "$GITHUB_RUN_ATTEMPT" \
            '.candidate_commit == $commit
             and .image_ref == $image
             and .image_digest_pinned == true
             and .source_verifier == "pass"
             and .installed_root_verifier == "pass"
             and .services_selftest == "pass"
             and .verification_iso_sha256 == $iso_sha
             and .iso_manifest_sha256 == $iso_manifest_sha
             and .bib_manifest_sha256 == $bib_manifest_sha
             and .release_evidence_manifest_sha256 == $evidence_manifest_sha
             and .runner_os == "Linux"
             and .runner_architecture == "aarch64"
             and .native_runner == true
             and .workflow_run_attempt == $attempt' \
            "$proof_dir/native-packaging-gate.json" >/dev/null
      - name: Materialize the native packaging gate with the candidate artifacts
        run: |
          mkdir -p os/signoff-proofs/native-gate/aarch64
          cp /tmp/goblins-os-native-gate-aarch64/native-packaging-gate.json \
            os/signoff-proofs/native-gate/aarch64/native-packaging-gate.json
      - name: Scan generated release evidence for secrets
        run: |
          . ./os/hardware-gate/secret-scan.sh
          goblins_os_artifact_secret_scan "$PWD"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: goblins-os-aarch64-verification-iso-${{ inputs.run_date }}
          retention-days: 7
          path: |
            os/iso/output/aarch64/bootiso/goblins-os-aarch64.iso
            os/iso/output/aarch64/bootiso/goblins-os-aarch64.iso.sha256
            os/iso/output/aarch64/manifest-goblins-os-aarch64.json
            os/iso/output/aarch64/manifest-anaconda-iso.json
            os/signoff-proofs/sbom/aarch64/
            os/signoff-proofs/native-gate/aarch64/native-packaging-gate.json
