# Compatibility entrypoint for producing shippable candidate media.
#
# This workflow delegates to the one digest-bound candidate implementation. It
# does not move a release-channel image, create a Git tag or GitHub Release,
# write generated evidence to Git, update the website, or promote stable.
name: candidate-release-media
run-name: candidate release media · ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  candidate-artifacts:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/candidate-artifacts.yml
    with:
      candidate_commit: ${{ github.sha }}
