# Goblins OS — default Codex configuration.
#
# Codex is THE builder in Goblins OS. By default it targets the on-device GPT-OSS
# model through a keyless, loopback OpenAI-compatible endpoint, so the OS builds
# apps with no OpenAI account and no API key out of the box. On THAT default
# keyless path there is no secret to leak (the endpoint is local-only). Signing in
# with an OpenAI account (Codex "Sign in with ChatGPT") upgrades Codex to that
# plan's hosted models; the account credentials live only under CODEX_HOME (0700,
# service-user-owned), never in the desktop session. NOTE: the approval/sandbox
# policy below governs ALL runs, including account-authenticated ones — so the
# agent's writable workspace is kept outside CODEX_HOME (see below).
#
# This file is the shipped default seed (installed read-only under /usr and copied
# into the persistent CODEX_HOME on first boot via tmpfiles). The on-device GPT-OSS
# runtime serves the OpenAI-compatible /v1 endpoint below; until a model is present
# the build path is complete and honest, and generation runs once the model is.

model = "gpt-oss"
model_provider = "goblins-local"

# Non-interactive OS builder: `never` is required so `codex exec` does not block on
# approval prompts there is no TTY to answer. Codex may read/write only within its
# workspace, which the core sets to an OS-owned scratch dir OUTSIDE CODEX_HOME
# (/var/lib/goblins-os/apps/codex-work) so an agent step never operates next to the
# account token (auth.json).
approval_policy = "never"
sandbox_mode = "workspace-write"

[model_providers.goblins-local]
name = "Goblins OS on-device GPT-OSS"
# Keyless loopback to the OS's on-device GPT-OSS runtime. No env_key by design:
# a local endpoint has no secret, satisfying the no-client-side-secrets contract.
# This compatibility wire is local-only; hosted OpenAI model calls are made by
# the Rust core through the Responses API.
base_url = "http://127.0.0.1:11434/v1"
wire_api = "chat"
