# Goblins OS GDM configuration.
#
# Identity in Goblins OS is owned by the in-session OpenAI login gate, not by a
# local Unix password. The machine therefore auto-enters the Goblins OS session
# as the local desktop user `goblin`, and the real sign-in — the user's real
# OpenAI account, or an explicit local-only choice — happens inside the session
# and is enforced by the OS session gate before the desktop unlocks. No OpenAI
# credential is ever a local login secret; they stay in OS services only.
[daemon]
WaylandEnable=true
AutomaticLoginEnable=True
AutomaticLogin=goblin
TimedLoginEnable=True
TimedLogin=goblin
TimedLoginDelay=0

[security]

[xdmcp]

[chooser]

[debug]
