# Goblins OS core capability sockets.
#
# Each shipped client has one non-overlapping Unix capability directory. The
# desktop user is deliberately not a member of any group below. A first-party
# setgid binary may connect once at process start, then permanently drops the
# capability group; the core enforces that client's route allowlist on the
# accepted connection. The persistent resident uses its own dedicated service
# account instead of a setgid desktop process.
d /run/goblins-os-core 0755 root root -
d /run/goblins-os-core/control-center 2750 goblins-os goblins-core-control-center -
d /run/goblins-os-core/dictate 2750 goblins-os goblins-core-dictate -
d /run/goblins-os-core/file-builder 2750 goblins-os goblins-core-file-builder -
d /run/goblins-os-core/focus-tick 2750 goblins-os goblins-core-focus-tick -
d /run/goblins-os-core/installer 2750 goblins-os goblins-core-installer -
d /run/goblins-os-core/launcher 2750 goblins-os goblins-core-launcher -
d /run/goblins-os-core/login 2750 goblins-os goblins-core-login -
d /run/goblins-os-core/markup 2750 goblins-os goblins-core-markup -
d /run/goblins-os-core/open 2750 goblins-os goblins-core-open -
d /run/goblins-os-core/release-proof 2750 goblins-os goblins-core-release-proof -
d /run/goblins-os-core/resident 2750 goblins-os goblins-core-resident -
d /run/goblins-os-core/screenshot-context 2750 goblins-os goblins-core-screenshot-context -
d /run/goblins-os-core/settings 2750 goblins-os goblins-core-settings -
d /run/goblins-os-core/shell 2750 goblins-os goblins-core-shell -
d /run/goblins-os-core/today 2750 goblins-os goblins-core-today -
d /run/goblins-os-core/visual-lookup 2750 goblins-os goblins-core-visual-lookup -
d /run/goblins-os-core/voice-control 2750 goblins-os goblins-core-voice-control -
# Voice models are provisioned read-only to the core service. Only this private
# per-call work root is writable, and every operation creates its own 0700 leaf.
d /var/lib/goblins-os/voice 0750 goblins-os goblins-os -
d /var/lib/goblins-os/voice/stt 0750 goblins-os goblins-os -
d /var/lib/goblins-os/voice/tts 0750 goblins-os goblins-os -
d /var/lib/goblins-os/voice/work 0700 goblins-os goblins-os -
