# Goblins OS — verification-only install ISO config (not release media).
#
# The normal os/iso/config.toml deliberately leaves disk selection interactive so
# release media never auto-wipes a person's disk. The display-backed hardware
# gate needs an unattended install onto its disposable scratch disk, and the ISO
# generated by bootc-image-builder points Anaconda at its embedded /osbuild.ks.
# This config is selected only by proof workflows via GOBLINS_OS_ISO_CONFIG.
#
# bootc-image-builder injects the image-deploying ostreecontainer line; do not
# set it here.

[customizations.installer.kickstart]
contents = """
text --non-interactive
lang en_US.UTF-8
keyboard us
timezone --utc Etc/UTC
network --bootproto=dhcp --device=link --activate --onboot=on

# Verification-only scratch disk automation. The qemu hardware gate attaches
# exactly one disposable virtio disk as vda; never use this config for release
# media or a human install path.
ignoredisk --only-use=vda
zerombr
clearpart --all --initlabel --disklabel=gpt --drives=vda
bootloader --location=mbr --boot-drive=vda
reqpart --add-boot
part / --fstype=xfs --label=root --grow --size=1024 --ondisk=vda

reboot --eject
%post
{
  echo "GOBLINS_HWGATE_POST_DIAG_BEGIN"
  echo "post_default_target=$(systemctl get-default 2>&1 || true)"
  for path in \
    /etc/systemd/system/default.target \
    /usr/lib/systemd/system/default.target \
    /etc/systemd/system/display-manager.service \
    /usr/lib/systemd/system/display-manager.service; do
    if [ -e "$path" ] || [ -L "$path" ]; then
      echo "$path -> $(readlink "$path" 2>&1 || true)"
    else
      echo "$path missing"
    fi
  done
  systemctl is-enabled gdm.service display-manager.service 2>&1 || true
  if [ -r /etc/gdm/custom.conf ]; then
    echo "gdm_custom_conf_begin"
    sed -n '1,80p' /etc/gdm/custom.conf
    echo "gdm_custom_conf_end"
  else
    echo "/etc/gdm/custom.conf missing"
  fi
  if [ -r /var/lib/AccountsService/users/goblin ]; then
    echo "accountsservice_goblin_begin"
    sed -n '1,80p' /var/lib/AccountsService/users/goblin
    echo "accountsservice_goblin_end"
  else
    echo "/var/lib/AccountsService/users/goblin missing"
  fi
  shadow_field="$(getent shadow goblin 2>/dev/null | cut -d: -f2 || true)"
  case "$shadow_field" in
    "") echo "goblin_shadow_state=empty" ;;
    '!'*) echo "goblin_shadow_state=locked" ;;
    '*') echo "goblin_shadow_state=invalid-star" ;;
    *) echo "goblin_shadow_state=hash-present" ;;
  esac
  echo "GOBLINS_HWGATE_POST_DIAG_DONE"
} > /dev/ttyS0 2>&1 || true

# Anaconda's verification-only text install writes an /etc default.target
# override to multi-user.target even though the bootc image default is
# graphical.target. The display-backed proof needs the installed deployment to
# exercise the real GNOME/GDM session, so restore the image contract here.
systemctl set-default graphical.target
readlink /etc/systemd/system/default.target | grep -Fq graphical.target
echo "GOBLINS_HWGATE_GRAPHICAL_TARGET_RESTORED" > /dev/ttyS0 || true

cat > /usr/libexec/goblins-hwgate-firstboot-diagnostics <<'EOF'
#!/usr/bin/env bash
set +e
exec >/dev/ttyS0 2>&1
echo "GOBLINS_HWGATE_DIAG_BEGIN"
echo "kernel=$(uname -r 2>&1)"
echo "default_target=$(systemctl get-default 2>&1)"
for path in \
  /etc/systemd/system/default.target \
  /usr/lib/systemd/system/default.target \
  /etc/systemd/system/display-manager.service \
  /usr/lib/systemd/system/display-manager.service; do
  if [ -e "$path" ] || [ -L "$path" ]; then
    echo "$path -> $(readlink "$path" 2>&1 || true)"
  else
    echo "$path missing"
  fi
done
echo "enabled_units_begin"
systemctl is-enabled graphical.target multi-user.target gdm.service display-manager.service 2>&1 || true
echo "enabled_units_end"
echo "active_units_begin"
systemctl is-active graphical.target multi-user.target gdm.service display-manager.service 2>&1 || true
echo "active_units_end"
systemctl --no-pager --full status graphical.target display-manager.service gdm.service 2>&1 || true
if [ -r /etc/gdm/custom.conf ]; then
  echo "gdm_custom_conf_begin"
  sed -n '1,80p' /etc/gdm/custom.conf
  echo "gdm_custom_conf_end"
else
  echo "/etc/gdm/custom.conf missing"
fi
if [ -r /var/lib/AccountsService/users/goblin ]; then
  echo "accountsservice_goblin_begin"
  sed -n '1,80p' /var/lib/AccountsService/users/goblin
  echo "accountsservice_goblin_end"
else
  echo "/var/lib/AccountsService/users/goblin missing"
fi
shadow_field="$(getent shadow goblin 2>/dev/null | cut -d: -f2 || true)"
case "$shadow_field" in
  "") echo "goblin_shadow_state=empty" ;;
  '!'*) echo "goblin_shadow_state=locked" ;;
  '*') echo "goblin_shadow_state=invalid-star" ;;
  *) echo "goblin_shadow_state=hash-present" ;;
esac
journalctl -b --no-pager \
  -u display-manager.service \
  -u gdm.service \
  -u systemd-logind.service \
  -u systemd-user-sessions.service \
  -n 200 2>&1 || true
echo "GOBLINS_HWGATE_DIAG_DONE"
EOF
chmod 0755 /usr/libexec/goblins-hwgate-firstboot-diagnostics

cat > /etc/systemd/system/goblins-hwgate-firstboot-diagnostics.service <<'EOF'
[Unit]
Description=Goblins OS hardware-gate first-boot diagnostics
After=multi-user.target graphical.target display-manager.service gdm.service

[Service]
Type=oneshot
ExecStart=/usr/libexec/goblins-hwgate-firstboot-diagnostics

[Install]
WantedBy=multi-user.target graphical.target
EOF
systemctl enable goblins-hwgate-firstboot-diagnostics.service || true

cat > /usr/libexec/goblins-hwgate-session-orchestrator <<'EOF'
#!/usr/bin/env bash
set -euo pipefail
exec >>/tmp/goblins-hwgate-session-orchestrator.log 2>&1

HOST_READY_URL="${GOBLINS_HWGATE_HOST_URL:-http://10.0.2.2:8099}"
LIVE_URL="${GOBLINS_OS_CORE_URL:-http://127.0.0.1:8787}"

download_with_wait() {
  local path="$1"
  local output="$2"
  local attempts="$3"
  local i
  for i in $(seq 1 "$attempts"); do
    if curl -fsS --max-time 2 -o "$output" "$HOST_READY_URL/$path"; then
      chmod 0700 "$output"
      return 0
    fi
    sleep 1
  done
  echo "failed to download $path from $HOST_READY_URL after ${attempts}s"
  return 1
}

download_with_wait firstboot-unlock.sh /tmp/gos-firstboot 240
GOBLINS_HWGATE_HOST_URL="$HOST_READY_URL" GOBLINS_OS_CORE_URL="$LIVE_URL" \
  bash /tmp/gos-firstboot

# drive-capture.py publishes orchestrator.sh only after it has recorded the
# post-unlock HTTP log offset, so screenshot/proof signals cannot race ahead of
# the host tailer.
download_with_wait orchestrator.sh /tmp/gos-orchestrator 600
GOBLINS_HWGATE_HOST_URL="$HOST_READY_URL" GOBLINS_OS_CORE_URL="$LIVE_URL" \
  bash /tmp/gos-orchestrator
EOF
chmod 0755 /usr/libexec/goblins-hwgate-session-orchestrator

install -d /etc/systemd/user/gnome-session@goblins-os.target.d
cat > /etc/systemd/user/goblins-hwgate-session-orchestrator.service <<'EOF'
[Unit]
Description=Goblins OS hardware-gate session orchestrator
After=gnome-session-initialized.target org.gnome.Shell@user.service org.goblins.OS.Shell.service org.goblins.OS.SessionBridge.service
Wants=org.goblins.OS.Shell.service org.goblins.OS.SessionBridge.service

[Service]
Type=oneshot
Environment=GOBLINS_HWGATE_HOST_URL=http://10.0.2.2:8099
Environment=GOBLINS_OS_CORE_URL=http://127.0.0.1:8787
ExecStart=/usr/libexec/goblins-hwgate-session-orchestrator
EOF

cat > /etc/systemd/user/gnome-session@goblins-os.target.d/99-goblins-hwgate-session-orchestrator.conf <<'EOF'
[Unit]
Wants=goblins-hwgate-session-orchestrator.service
EOF

echo "GOBLINS_VERIFY_INSTALL_DONE" > /dev/ttyS0 || true
%end
"""

[customizations.installer.modules]
disable = ["org.fedoraproject.Anaconda.Modules.Users"]

[customizations.iso]
volume_id = "GOBLINS_OS"
application_id = "Goblins OS"
publisher = "Goblins OS"
