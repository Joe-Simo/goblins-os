# Goblins OS — build, verify, render, and produce the installer ISO.
#
# Runs on native Linux runners for both supported architectures. The macOS dev
# sandbox can render GUIs headlessly; this pipeline is CI artifact proof, not
# final release signoff. It boots nothing, but proves the image builds, the
# packaging contract holds, the screens render, and non-release ISO artifacts
# are produced per architecture.
name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # Same feature set the Containerfile uses for the native desktop binaries.
  NATIVE_FEATURES: >-
    goblins-os-installer/native-desktop
    goblins-os-control-center/native-desktop
    goblins-os-launcher/native-desktop
    goblins-os-login/native-desktop
    goblins-os-settings/native-desktop
    goblins-os-shell/native-desktop
    goblins-os-ui/native-desktop

jobs:
  # 1. Fast Rust gate: compile, lint, and unit tests for the whole workspace.
  rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            expected_uname: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            expected_uname: aarch64
    runs-on: ${{ matrix.runner }}
    container: docker.io/library/rust:1.88
    steps:
      - uses: actions/checkout@v4
      - name: Assert native runner architecture
        run: |
          test "$(uname -m)" = "${{ matrix.expected_uname }}"
      - name: Install GTK4 dev libraries
        run: |
          apt-get update
          apt-get install -y --no-install-recommends libgtk-4-dev pkg-config
      - name: Add rustfmt and clippy components
        run: rustup component add rustfmt clippy
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --features "$NATIVE_FEATURES" -- -D warnings
      - name: Tests
        run: cargo test --workspace --features "$NATIVE_FEATURES"
      - name: Release build
        run: cargo build --release --workspace --features "$NATIVE_FEATURES"

  # 2. Build the bootc OS image, enforce the packaging contract, and render the
  #    design-proof screenshots (uploaded as an artifact for review).
  image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            expected_uname: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            expected_uname: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Assert native runner architecture
        run: |
          test "$(uname -m)" = "${{ matrix.expected_uname }}"
      - name: Maximize build disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup /opt/hostedtoolcache || true
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker /etc/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          df -h / /mnt
      - name: Build the Goblins OS image
        run: docker build -f os/bootc/Containerfile --target goblins-os -t goblins-os:${{ matrix.arch }} .
      - name: Verify the packaging contract (must be 0 blocked)
        run: |
          docker run --rm goblins-os:${{ matrix.arch }} /usr/libexec/goblins-os/goblins-os-verify | tee verify-${{ matrix.arch }}.log
          grep -q 'blocked=0' verify-${{ matrix.arch }}.log
      - name: Run the install + services self-test (non-zero fails the build)
        run: |
          cat os/bootc/Containerfile os/bootc/selftest.suffix.Dockerfile > /tmp/selftest.Dockerfile
          DOCKER_BUILDKIT=1 docker build -f /tmp/selftest.Dockerfile --target selftest -t goblins-os:selftest-${{ matrix.arch }} .
      - name: Render design-proof screenshots
        run: |
          cat os/bootc/Containerfile os/bootc/render.suffix.Dockerfile > /tmp/render.Dockerfile
          mkdir -p screenshots
          DOCKER_BUILDKIT=1 docker build -f /tmp/render.Dockerfile \
            --target screenshots --output type=local,dest=screenshots .
      - uses: actions/upload-artifact@v4
        with:
          name: goblins-os-screenshots-${{ matrix.arch }}
          path: screenshots/*.png

  # 3. Produce CI ISO artifacts with bootc-image-builder through Docker. Release
  #    media must be generated by the hardware gate with a real pullable bootc
  #    source image, display-backed screenshots, and close-signoff.
  installer-iso:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            expected_uname: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            expected_uname: aarch64
    runs-on: ${{ matrix.runner }}
    needs: image
    steps:
      - uses: actions/checkout@v4
      - name: Assert native runner architecture
        run: |
          test "$(uname -m)" = "${{ matrix.expected_uname }}"
      - name: Maximize build disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup /opt/hostedtoolcache || true
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker /etc/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          df -h / /mnt
      - name: Build the Goblins OS image
        run: docker build -f os/bootc/Containerfile -t localhost/goblins-os:${{ matrix.arch }} .
      - name: Build the installer ISO
        run: GOBLINS_OS_CONTAINER_RUNTIME=docker GOBLINS_OS_ARCH=${{ matrix.arch }} GOBLINS_OS_IMAGE=localhost/goblins-os:${{ matrix.arch }} os/iso/build-iso.sh
      - name: Generate release evidence
        run: |
          mkdir -p os/signoff-proofs/sbom/${{ matrix.arch }}
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -v "$PWD/os/signoff-proofs/sbom/${{ matrix.arch }}:/out" \
            -w /workspace \
            localhost/goblins-os:${{ matrix.arch }} \
            /usr/libexec/goblins-os/goblins-os-verify \
            --source-root /workspace \
            --release-evidence /out \
            --arch ${{ matrix.arch }}
          docker run --rm \
            -v "$PWD/os/signoff-proofs/sbom/${{ matrix.arch }}:/out" \
            -w /out \
            localhost/goblins-os:${{ matrix.arch }} \
            sh rpm-packages.command
          . ./os/hardware-gate/rpm-sbom-arch.sh
          rpm_sbom_arch_matches os/signoff-proofs/sbom/${{ matrix.arch }}/rpm-packages.tsv ${{ matrix.arch }}
      - name: Scan generated release evidence for secrets
        run: |
          . ./os/hardware-gate/secret-scan.sh
          goblins_os_artifact_secret_scan "$PWD"
      - uses: actions/upload-artifact@v4
        with:
          name: goblins-os-installer-iso-${{ matrix.arch }}
          path: |
            os/iso/output/${{ matrix.arch }}/bootiso/goblins-os-${{ matrix.arch }}.iso
            os/iso/output/${{ matrix.arch }}/bootiso/goblins-os-${{ matrix.arch }}.iso.sha256
            os/iso/output/${{ matrix.arch }}/manifest-goblins-os-${{ matrix.arch }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: goblins-os-release-evidence-${{ matrix.arch }}
          path: os/signoff-proofs/sbom/${{ matrix.arch }}/*
